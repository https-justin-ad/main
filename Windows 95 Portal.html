document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"cba5263c-c9e1-4184-8274-7f70798ec2e1\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  html,body,#root{margin:0;height:100%;width:100%}\n  body{font-family:Tahoma,'MS Sans Serif',Geneva,Verdana,sans-serif;font-size:12px;-webkit-font-smoothing:none;overflow:hidden}\n  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div onclick=\"{{ bgClick }}\" style=\"position:relative;width:100%;height:100vh;overflow:hidden;background:{{ desktopColor }};color:#000;font-family:Tahoma,'MS Sans Serif',Geneva,Verdana,sans-serif;font-size:12px;\">\n\n  <div style=\"position:absolute;top:10px;left:8px;bottom:40px;display:flex;flex-direction:column;flex-wrap:wrap;align-content:flex-start;gap:14px 8px;z-index:10;\">\n    <sc-for list=\"{{ icons }}\" as=\"ic\" hint-placeholder-count=\"9\">\n      <div onclick=\"{{ ic.onSelect }}\" ondoubleclick=\"{{ ic.onOpen }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:3px;width:78px;cursor:default;\">\n        <div style=\"width:44px;height:44px;display:flex;align-items:center;justify-content:center;\">{{ ic.el }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:#fff;text-align:center;line-height:1.2;padding:1px 3px;max-width:76px;background:{{ ic.labelBg }};outline:{{ ic.labelOutline }};\">{{ ic.label }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <sc-for list=\"{{ wins }}\" as=\"w\" hint-placeholder-count=\"0\">\n    <div onmousedown=\"{{ w.onFocus }}\" style=\"position:absolute;flex-direction:column;background:#c0c0c0;box-shadow:inset -1px -1px 0 #000,inset 1px 1px 0 #fff,inset -2px -2px 0 #808080,inset 2px 2px 0 #dfdfdf;padding:3px;left:{{ w.left }};top:{{ w.top }};width:{{ w.width }};height:{{ w.height }};z-index:{{ w.z }};display:{{ w.display }};\">\n      <div onmousedown=\"{{ w.onTitleDown }}\" style=\"display:flex;align-items:center;gap:4px;height:20px;padding:0 2px 0 3px;background:linear-gradient(90deg,#000080,#1084d0);color:#fff;cursor:default;flex:0 0 auto;\">\n        <div style=\"width:16px;height:16px;flex:0 0 auto;\">{{ w.icon }}<\u002Fdiv>\n        <div style=\"flex:1;font-weight:700;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ w.title }}<\u002Fdiv>\n        <div style=\"display:flex;gap:2px;\">\n          <div onclick=\"{{ w.onMin }}\" style=\"width:16px;height:14px;background:#c0c0c0;box-shadow:inset -1px -1px 0 #000,inset 1px 1px 0 #fff,inset -2px -2px 0 #808080,inset 2px 2px 0 #dfdfdf;display:flex;align-items:flex-end;justify-content:center;font-size:11px;font-weight:700;line-height:1;color:#000;padding-bottom:2px;cursor:default;\" style-active=\"box-shadow:inset 1px 1px 0 #000,inset -1px -1px 0 #fff,inset 2px 2px 0 #808080,inset -2px -2px 0 #dfdfdf\">_<\u002Fdiv>\n          <div onclick=\"{{ w.onMax }}\" style=\"width:16px;height:14px;background:#c0c0c0;box-shadow:inset -1px -1px 0 #000,inset 1px 1px 0 #fff,inset -2px -2px 0 #808080,inset 2px 2px 0 #dfdfdf;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;line-height:1;color:#000;cursor:default;\" style-active=\"box-shadow:inset 1px 1px 0 #000,inset -1px -1px 0 #fff,inset 2px 2px 0 #808080,inset -2px -2px 0 #dfdfdf\">□<\u002Fdiv>\n          <div onclick=\"{{ w.onClose }}\" style=\"width:16px;height:14px;background:#c0c0c0;box-shadow:inset -1px -1px 0 #000,inset 1px 1px 0 #fff,inset -2px -2px 0 #808080,inset 2px 2px 0 #dfdfdf;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;line-height:1;color:#000;cursor:default;\" style-active=\"box-shadow:inset 1px 1px 0 #000,inset -1px -1px 0 #fff,inset 2px 2px 0 #808080,inset -2px -2px 0 #dfdfdf\">✕<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-it ct(sn.food.x*px + px*0.22, sn.food.y*px + px*0.22, px*0.56, px*0.56);\n    sn.cells.forEach((c,i)=>{ ctx.fillStyle = i===0 ? '#1c2713' : '#2b3a1f'; ctx.fillRect(c.x*px+1, c.y*px+1, px-2, px-2); });\n  }\n\n  /* ---- Pinball ---- */\n  initPinball(){\n    return {\n      W:300, H:360, ball:null, serveAt:0,\n      lUp:false, rUp:false,\n      lA:0.30, rA:0.30, flipLen:52, flipRest:0.30, flipUp:-0.52,\n      lPivot:{x:84,y:332}, rPivot:{x:216,y:332},\n      bumpers:[ {x:90,y:100,r:16,lit:0}, {x:210,y:100,r:16,lit:0}, {x:150,y:165,r:18,lit:0} ],\n      segs:[ {ax:12,ay:260,bx:84,by:332}, {ax:288,ay:260,bx:216,by:332} ],\n      score:0, balls:3, over:false, started:false,\n    };\n  }\n  serveBall(){ const pb=this.pb; pb.ball = { x:150, y:30, vx:(Math.random()*2-1), vy:1.6, r:7 }; }\n  newPinball(){\n    this.pb = this.initPinball();\n    this.pb.started = true;\n    this.serveBall();\n    this.forceUpdate();\n    this.ensurePBLoop();\n  }\n  ensurePBLoop(){\n    this.clearPB();\n    const win = this.state.windows.find(w=>w.kind==='pinball');\n    if(win && !win.min){ this._pbTimer = setInterval(()=>this.stepPB(), 16); }\n  }\n  collideSeg(b, ax, ay, bx, by, thick, rest, extra){\n    const dx=bx-ax, dy=by-ay; const len2=dx*dx+dy*dy||1;\n    let t=((b.x-ax)*dx+(b.y-ay)*dy)/len2; t=Math.max(0,Math.min(1,t));\n    const cx=ax+t*dx, cy=ay+t*dy; const ox=b.x-cx, oy=b.y-cy;\n    const d=Math.hypot(ox,oy)||0.001; const rad=b.r+thick;\n    if(d<rad){\n      const nx=ox/d, ny=oy/d; const overlap=rad-d;\n      b.x+=nx*overlap; b.y+=ny*overlap;\n      const dot=b.vx*nx+b.vy*ny;\n      if(dot<0){ b.vx-=(1+rest)*dot*nx; b.vy-=(1+rest)*dot*ny; }\n      if(extra){ b.vx+=nx*extra; b.vy+=ny*extra; }\n    }\n  }\n  stepPB(){\n    const pb=this.pb; if(!pb){ return; }\n    pb.lA += ((pb.lUp?pb.flipUp:pb.flipRest)-pb.lA)*0.45;\n    pb.rA += ((pb.rUp?pb.flipUp:pb.flipRest)-pb.rA)*0.45;\n    if(!pb.started || pb.over){ this.drawPB(); return; }\n    let b=pb.ball;\n    if(!b){ if(Date.now()>pb.serveAt){ this.serveBall(); b=pb.ball; } else { this.drawPB(); return; } }\n    b.vy += 0.16; b.x += b.vx; b.y += b.vy;\n    if(b.y<260){\n      if(b.x-b.r<12){ b.x=12+b.r; b.vx=-b.vx*0.86; }\n      if(b.x+b.r>288){ b.x=288-b.r; b.vx=-b.vx*0.86; }\n    } else {\n      if(b.x-b.r<6){ b.x=6+b.r; b.vx=-b.vx*0.8; }\n      if(b.x+b.r>294){ b.x=294-b.r; b.vx=-b.vx*0.8; }\n    }\n    if(b.y-b.r<12){ b.y=12+b.r; b.vy=-b.vy*0.86; }\n    let dirty=false;\n    pb.bumpers.forEach(bm=>{\n      const dx=b.x-bm.x, dy=b.y-bm.y, d=Math.hypot(dx,dy)||1;\n      if(d<b.r+bm.r){\n        const nx=dx/d, ny=dy/d;\n        b.x=bm.x+nx*(b.r+bm.r); b.y=bm.y+ny*(b.r+bm.r);\n        const dot=b.vx*nx+b.vy*ny; b.vx-=2*dot*nx; b.vy-=2*dot*ny;\n        b.vx+=nx*2.4; b.vy+=ny*2.4;\n        bm.lit=8; pb.score+=100; dirty=true;\n      }\n      if(bm.lit>0) bm.lit--;\n    });\n    pb.segs.forEach(sg=>this.collideSeg(b, sg.ax, sg.ay, sg.bx, sg.by, 4, 0.7, 0));\n    const L=pb.flipLen;\n    const lTip={ x:pb.lPivot.x+L*Math.cos(pb.lA), y:pb.lPivot.y+L*Math.sin(pb.lA) };\n    const rTip={ x:pb.rPivot.x-L*Math.cos(pb.rA), y:pb.rPivot.y+L*Math.sin(pb.rA) };\n    this.collideSeg(b, pb.lPivot.x, pb.lPivot.y, lTip.x, lTip.y, 5, 0.5, pb.lUp?7:0);\n    this.collideSeg(b, pb.rPivot.x, pb.rPivot.y, rTip.x, rTip.y, 5, 0.5, pb.rUp?7:0);\n    const sp=Math.hypot(b.vx,b.vy); if(sp>11){ b.vx*=11/sp; b.vy*=11/sp; }\n    if(b.y-b.r>pb.H){\n      pb.ball=null; pb.balls--; dirty=true;\n      if(pb.balls<=0){ pb.over=true; } else { pb.serveAt=Date.now()+700; }\n    }\n    this.drawPB();\n    if(dirty) this.forceUpdate();\n  }\n  drawPB(){\n    const cv=this._pbCanvas; if(!cv) return;\n    const pb=this.pb; const ctx=cv.getContext('2d');\n    ctx.fillStyle='#0c1430'; ctx.fillRect(0,0,cv.width,cv.height);\n    ctx.strokeStyle='#3a4a8a'; ctx.lineWidth=4; ctx.lineCap='butt';\n    ctx.beginPath(); ctx.moveTo(12,260); ctx.lineTo(12,12); ctx.lineTo(288,12); ctx.lineTo(288,260); ctx.stroke();\n    ctx.beginPath(); ctx.moveTo(12,260); ctx.lineTo(84,332); ctx.moveTo(288,260); ctx.lineTo(216,332); ctx.stroke();\n    if(!pb) return;\n    pb.bumpers.forEach(bm=>{\n      ctx.beginPath(); ctx.arc(bm.x,bm.y,bm.r,0,Math.PI*2);\n      ctx.fillStyle = bm.lit>0 ? '#ffe27a' : '#e0457b'; ctx.fill();\n      ctx.lineWidth=3; ctx.strokeStyle = bm.lit>0 ? '#fff' : '#7a2347'; ctx.stroke();\n    });\n    const L=pb.flipLen;\n    const lTip={ x:pb.lPivot.x+L*Math.cos(pb.lA), y:pb.lPivot.y+L*Math.sin(pb.lA) };\n    const rTip={ x:pb.rPivot.x-L*Math.cos(pb.rA), y:pb.rPivot.y+L*Math.sin(pb.rA) };\n    ctx.strokeStyle='#ff9f43'; ctx.lineWidth=10; ctx.lineCap='round';\n    ctx.beginPath(); ctx.moveTo(pb.lPivot.x,pb.lPivot.y); ctx.lineTo(lTip.x,lTip.y); ctx.stroke();\n    ctx.beginPath(); ctx.moveTo(pb.rPivot.x,pb.rPivot.y); ctx.lineTo(rTip.x,rTip.y); ctx.stroke();\n    if(pb.ball){\n      const b=pb.ball;\n      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);\n      ctx.fillStyle='#eef1f8'; ctx.fill();\n      ctx.lineWidth=1; ctx.strokeStyle='#9aa3c0'; ctx.stroke();\n    }\n  }\n\n  /* ---- Weather ---- */\n  setWeather(patch){ this.setState(s=>({ weather:{ ...s.weather, ...patch } })); }\n  setZip(v){ v=(v||'').replace(/[^0-9]/g,'').slice(0,5); this.setWeather({ zip:v }); }\n  async fetchWeather(){\n    const zip = (this.state.weather.zip||'').trim();\n    if(!/^\\d{5}$/.test(zip)){ this.setWeather({ error:'Please enter a 5-digit US ZIP code.', days:[], place:'' }); return; }\n    this.setWeather({ loading:true, error:'', days:[] });\n    try{\n      const r1 = await fetch('https://api.zippopotam.us/us/'+zip);\n      if(!r1.ok) throw new Error('ZIP code not found.');\n      const j1 = await r1.json();\n      const pl = j1.places && j1.places[0];\n      if(!pl) throw new Error('ZIP code not found.');\n      const place = pl['place name'] + ', ' + pl['state abbreviation'];\n      const lat = pl.latitude, lon = pl.longitude;\n      const url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=auto&forecast_days=10';\n      const r2 = await fetch(url);\n      if(!r2.ok) throw new Error('Weather service unavailable.');\n      const j2 = await r2.json(); const dy = j2.daily;\n      if(!dy || !dy.time) throw new Error('No forecast available.');\n      const days = dy.time.map((t,i)=>({ date:t, code:dy.weathercode[i], hi:dy.temperature_2m_max[i], lo:dy.temperature_2m_min[i], pop:(dy.precipitation_probability_max ? dy.precipitation_probability_max[i] : null) }));\n      this.setWeather({ loading:false, place, days, error:'' });\n    }catch(err){\n      this.setWeather({ loading:false, error:(err && err.message) || 'Could not load forecast.', days:[], place:'' });\n    }\n  }\n\n  /* ---- Keyboard ---- */\n  onKey(e){\n    const k = (e.key||'').toLowerCase();\n    if(this.state.active==='snake'){\n      const win = this.state.windows.find(w=>w.kind==='snake');\n      if(!win || win.min) return;\n      let h=true;\n      if(k==='arrowup'||k==='w') this.setDir(0,-1);\n      else if(k==='arrowdown'||k==='s') this.setDir(0,1);\n      else if(k==='arrowleft'||k==='a') this.setDir(-1,0);\n      else if(k==='arrowright'||k==='d') this.setDir(1,0);\n      else if(k===' '||k==='enter') this.newGame();\n      else h=false;\n      if(h) e.preventDefault();\n      return;\n    }\n    if(this.state.active==='pinball'){\n      const pb=this.pb; let h=true;\n      if(k==='arrowleft'||k==='a'||k==='z'){ if(pb) pb.lUp=true; }\n      else if(k==='arrowright'||k==='l'||k==='/'){ if(pb) pb.rUp=true; }\n      else if(k===' '||k==='enter'){ if(!pb||!pb.started||pb.over) this.newPinball(); }\n      else h=false;\n      if(h) e.preventDefault();\n      return;\n    }\n  }\n  onKeyUp(e){\n    if(this.state.active!=='pinball') return;\n    const pb=this.pb; if(!pb) return;\n    const k=(e.key||'').toLowerCase();\n    if(k==='arrowleft'||k==='a'||k==='z') pb.lUp=false;\n    else if(k==='arrowright'||k==='l'||k==='/') pb.rUp=false;\n  }\n\n  renderVals(){\n    const RAISED = 'inset -1px -1px 0 #000,inset 1px 1px 0 #fff,inset -2px -2px 0 #808080,inset 2px 2px 0 #dfdfdf';\n    const PRESSED = 'inset 1px 1px 0 #000,inset -1px -1px 0 #fff,inset 2px 2px 0 #808080,inset -2px -2px 0 #dfdfdf';\n    const desktopColor = this.props.desktopColor ?? '#008080';\n    const showClock = this.props.showClock ?? true;\n    const banner = this.props.bannerText ?? 'justin.ad';\n    const S = this.state;\n    const glyphFor = { mycomputer:'computer', recycle:'bin', about:'doc', snake:'snake', pinball:'pinball', weather:'weather' };\n\n    const icons = this.ICONS.map(ic=>({\n      label: ic.label,\n      el: this.makeIcon(ic.glyph, 44, ic.type==='link'),\n      labelBg: S.selected===ic.id ? '#0a246a' : 'transparent',\n      labelOutline: S.selected===ic.id ? '1px dotted #fff' : '1px dotted transparent',\n      onSelect: (e)=>{ e.stopPropagation(); this.selectIcon(ic.id); },\n      onOpen: (e)=>{ e.stopPropagation(); this.openIcon(ic); },\n    }));\n\n    const menu = this.MENU.map((m,i)=>({\n      key: i,\n      isSep: m.type==='sep',\n      notSep: m.type!=='sep',\n      label: m.label,\n      el: m.glyph ? this.makeIcon(m.glyph, 26, m.type==='link') : null,\n      onClick: (e)=>{ e.stopPropagation(); if(m.type==='link') this.openExternal(m.href); else if(m.type==='win') this.openWindow(m.kind); else if(m.type==='shutdown') this.doShutdown(); },\n    }));\n\n    const mcItems = [\n      { label:'3\\u00bd Floppy (A:)', glyph:'floppy' },\n      { label:'(C:)', glyph:'drive' },\n      { label:'(D:)', glyph:'drive' },\n      { label:'Control Panel', glyph:'folder' },\n      { label:'Flights', glyph:'globe', href:'https://flights.google.com' },\n      { label:'Proton Mail', glyph:'mail', href:'https://proton.me' },\n      { label:'Windy', glyph:'weather', href:'https://www.windy.com' },\n    ].map(it=>({\n      label: it.label,\n      el: this.makeIcon(it.glyph, 32, !!it.href),\n      onOpen: (e)=>{ e.stopPropagation(); if(it.href) this.openExternal(it.href); },\n    }));\n\n    const wins = S.windows.map(w=>{\n      const isMC=w.kind==='mycomputer', isRB=w.kind==='recycle', isAB=w.kind==='about', isSn=w.kind==='snake', isPin=w.kind==='pinball', isWx=w.kind==='weather';\n      const items = isMC ? mcItems : [];\n      return {\n        z: w.z,\n        left: w.max ? '0px' : w.x+'px',\n        top: w.max ? '0px' : w.y+'px',\n        width: w.max ? '100%' : w.w+'px',\n        height: w.max ? 'calc(100vh - 30px)' : w.h+'px',\n        display: w.min ? 'none' : 'flex',\n        title: w.title,\n        icon: this.makeIcon(glyphFor[w.kind], 16),\n        isMC, isRB, isAB, isSnake:isSn, isPinball:isPin, isWeather:isWx,\n        menu3: isAB ? 'Search' : ((isSn||isPin) ? 'Game' : (isWx ? 'Tools' : 'View')),\n        items, aboutText: this.ABOUT,\n        status: isMC ? (items.length+' object(s)') : (isRB ? '0 object(s)' : ''),\n        hasStatus: isMC || isRB,\n        onTitleDown: (e)=>this.startDrag(w.id, e),\n        onFocus: ()=>this.focus(w.id),\n        onClose: (e)=>{ e.stopPropagation(); this.closeWin(w.id); },\n        onMin: (e)=>{ e.stopPropagation(); this.toggleMin(w.id); },\n        onMax: (e)=>{ e.stopPropagation(); this.toggleMax(w.id); },\n      };\n    });\n\n    const taskbtns = S.windows.map(w=>{\n      const on = S.active===w.id && !w.min;\n      return {\n        title: w.title,\n        icon: this.makeIcon(glyphFor[w.kind], 16),\n        shadow: on ? PRESSED : RAISED,\n        weight: on ? 700 : 400,\n        onClick: (e)=>{ e.stopPropagation(); this.taskClick(w.id); },\n      };\n    });\n\n    const sn = S.snake;\n    const snake = {\n      score: sn ? sn.score : 0,\n      high: sn ? sn.high : 0,\n      overlay: sn ? (!sn.started || sn.over) : true,\n      overlayText: (sn && sn.over) ? 'GAME OVER' : 'SNAKE',\n      overlaySub: (sn && sn.over) ? ('Score ' + (sn ? sn.score : 0) + ' \\u2014 click New Game') : 'Click New Game to start',\n      onNew: (e)=>{ if(e) e.stopPropagation(); this.newGame(); },\n    };\n\n    const pb = this.pb;\n    const pinball = {\n      score: pb ? pb.score : 0,\n      ballsDots: pb ? '\\u25CF'.repeat(Math.max(0,pb.balls)) : '\\u25CF\\u25CF\\u25CF',\n      overlay: pb ? (!pb.started || pb.over) : true,\n      overlayText: (pb && pb.over) ? 'GAME OVER' : 'PINBALL',\n      overlaySub: (pb && pb.over) ? ('Final score ' + (pb ? pb.score : 0) + ' \\u2014 New Game') : 'New Game to launch \\u2014 \\u2190/\\u2192 flip',\n      onNew: (e)=>{ if(e) e.stopPropagation(); this.newPinball(); },\n    };\n\n    const wx = S.weather;\n    const wdays = (wx.days||[]).map((d,i)=>{\n      const info = this.wxInfo(d.code);\n      const dt = new Date(d.date+'T00:00');\n      return {\n        key:i,\n        wd: i===0 ? 'Today' : dt.toLocaleDateString(undefined,{weekday:'short'}),\n        mo: dt.toLocaleDateString(undefined,{month:'short',day:'numeric'}),\n        el: this.makeWx(info.kind, 26),\n        label: info.label,\n        hi: Math.round(d.hi),\n        lo: Math.round(d.lo),\n        pop: (d.pop==null ? '' : d.pop+'%'),\n      };\n    });\n    const weather = {\n      zip: wx.zip, loading: wx.loading, error: wx.error, place: wx.place,\n      hasDays: wdays.length>0, days: wdays,\n      onZip: (e)=>this.setZip(e.target.value),\n      onGo: (e)=>{ if(e) e.stopPropagation(); this.fetchWeather(); },\n      onKey: (e)=>{ if(e.key==='Enter') this.fetchWeather(); },\n    };\n\n    return {\n      desktopColor, showClock, banner,\n      icons, menu, wins, taskbtns,\n      snake, snakeRef: this._snakeRef,\n      pinball, pbRef: this._pbRef,\n      weather,\n      time: S.time, startOpen: S.startOpen, shutdown: S.shutdown,\n      startHint: !S.startEverOpened,\n      startIcon: this.makeIcon('globe', 18, false),\n      startBtnShadow: S.startOpen ? PRESSED : RAISED,\n      bgClick: ()=>this.bgClick(),\n      toggleStart: (e)=>{ e.stopPropagation(); this.toggleStart(); },\n      restart: ()=>this.restart(),\n      stop: (e)=>e.stopPropagation(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
