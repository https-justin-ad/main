<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 98 - Weather</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "MS Sans Serif", Arial, sans-serif;
            background-color: #008080;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .taskbar {
            width: 100%;
            height: 40px;
            background-color: #C0C0C0;
            border-top: 2px solid #FFFFFF;
            border-bottom: 2px solid #808080;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            position: fixed;
            bottom: 0;
            left: 0;
        }

        .start-button {
            background-color: #C0C0C0;
            border: 2px outset #FFFFFF;
            font-size: 16px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .desktop {
            display: flex;
            flex-wrap: wrap;
            margin-top: 50px;
            justify-content: center;
            gap: 20px;
            padding-bottom: 50px;
        }

        .icon {
            width: 100px;
            text-align: center;
            font-size: 14px;
        }

        .icon img {
            width: 48px;
            height: 48px;
        }

        .window {
            width: 300px;
            background-color: #FFFFFF;
            border: 2px outset #C0C0C0;
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.5);
            margin: 20px auto;
            padding: 10px;
        }

        .window-header {
            background-color: #000080;
            color: white;
            font-size: 16px;
            padding: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-content {
            margin: 10px 0;
            font-size: 14px;
        }

        .weather-tool {
            background-color: #F0F0F0;
            padding: 10px;
            border: 2px inset #C0C0C0;
        }

        input {
            padding: 5px;
            margin-right: 5px;
        }

        button {
            padding: 5px;
            background-color: #C0C0C0;
            border: 2px outset #FFFFFF;
            cursor: pointer;
        }

        button:hover {
            background-color: #A0A0A0;
        }
    </style>
</head>
<body>
    <div class="desktop">
        <div class="icon">
            <img src="https://via.placeholder.com/48" alt="My Computer">
            <p>My Computer</p>
        </div>
        <div class="icon">
            <img src="https://via.placeholder.com/48" alt="Recycle Bin">
            <p>Recycle Bin</p>
        </div>
        <div class="icon">
            <img src="https://via.placeholder.com/48" alt="Weather">
            <p>Weather</p>
        </div>
    </div>

    <div class="window">
        <div class="window-header">
            <span>Weather Tool</span>
            <span>[X]</span>
        </div>
        <div class="window-content">
            <div class="weather-tool">
                <label for="zipCode">Enter Zip Code: </label>
                <input type="text" id="zipCode" placeholder="e.g., 90210">
                <button onclick="getTemperature()">Get Temperature</button>
                <p id="output"></p>
            </div>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-button">Start</button>
        <span>12:00 PM</span>
    </div>

    <script>
        async function getTemperature() {
            const zipCode = document.getElementById('zipCode').value;
            const apiKey = '55b7ffd03f374a2d87642322242812'; // Your WeatherAPI key
            const output = document.getElementById('output');

            if (!zipCode) {
                output.textContent = 'Please enter a valid zip code.';
                return;
            }

            const url = `https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${zipCode}&aqi=no`;

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('Invalid zip code or unable to fetch data.');
                }

                const data = await response.json();
                const temperature = data.current.temp_f;
                output.textContent = `The current temperature in ${zipCode} is ${temperature}°F.`;
            } catch (error) {
                output.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
